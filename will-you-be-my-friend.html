<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Will You Be My Friend? 🥺🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pink-1:#ff2e93;
    --pink-2:#ff7ac6;
    --pink-3:#ffd1e8;
    --black-1:#05030a;
    --black-2:#0e0710;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,150,200,0.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;height:100%;
    background:var(--black-1);
    overflow-x:hidden;
    font-family:'Poppins',sans-serif;
    scroll-behavior:smooth;
  }
  ::selection{background:var(--pink-1);color:#fff;}

  /* ---------- LOADING SCREEN ---------- */
  #loader{
    position:fixed;inset:0;z-index:999;
    background:radial-gradient(circle at 50% 40%, #1a0a14 0%, #05030a 80%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .8s ease, visibility .8s ease;
  }
  #loader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .loader-heart{
    font-size:3rem;
    animation:loaderBeat 1s ease-in-out infinite;
    filter:drop-shadow(0 0 20px var(--pink-1));
  }
  @keyframes loaderBeat{
    0%,100%{transform:scale(1);}
    25%{transform:scale(1.25);}
    40%{transform:scale(0.95);}
  }
  .loader-text{
    margin-top:18px;font-family:'Dancing Script',cursive;
    font-size:1.6rem;color:var(--pink-2);
    letter-spacing:1px;
    text-shadow:0 0 15px rgba(255,60,150,0.6);
  }
  .loader-bar{
    margin-top:22px;width:180px;height:4px;border-radius:10px;
    background:rgba(255,255,255,0.08);overflow:hidden;
  }
  .loader-bar-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg,var(--pink-1),var(--pink-2));
    border-radius:10px;
    animation:loadFill 2.2s ease forwards;
  }
  @keyframes loadFill{to{width:100%;}}

  /* ---------- BACKGROUND ---------- */
  #bg-gradient{
    position:fixed;inset:0;z-index:-3;
    background:linear-gradient(135deg,#05030a 0%,#150710 35%,#2b0a1e 65%,#050208 100%);
    background-size:250% 250%;
    animation:gradientMove 18s ease infinite;
  }
  @keyframes gradientMove{
    0%{background-position:0% 30%;}
    50%{background-position:100% 70%;}
    100%{background-position:0% 30%;}
  }
  #glow-blobs{position:fixed;inset:0;z-index:-2;overflow:hidden;}
  .blob{
    position:absolute;border-radius:50%;
    filter:blur(70px);
    opacity:.35;
    animation:blobFloat 14s ease-in-out infinite;
  }
  .blob1{width:420px;height:420px;background:var(--pink-1);top:-100px;left:-100px;animation-delay:0s;}
  .blob2{width:360px;height:360px;background:#8a0e46;bottom:-120px;right:-80px;animation-delay:3s;}
  .blob3{width:300px;height:300px;background:var(--pink-2);top:40%;left:60%;animation-delay:6s;}
  @keyframes blobFloat{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(40px,-30px) scale(1.15);}
  }

  #particle-layer{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;}
  .particle{position:absolute;will-change:transform,opacity;}
  .star-particle{
    position:absolute;color:#fff;pointer-events:none;
    animation:twinkle 2.4s ease-in-out infinite;
    text-shadow:0 0 8px rgba(255,255,255,0.9), 0 0 16px rgba(255,150,200,0.6);
  }
  @keyframes twinkle{
    0%,100%{opacity:.15;transform:scale(0.7);}
    50%{opacity:1;transform:scale(1.15);}
  }
  @keyframes bounceIn{
    0%{transform:translateY(0);}
    20%{transform:translateY(-18px);}
    40%{transform:translateY(0);}
    55%{transform:translateY(-9px);}
    70%{transform:translateY(0);}
    85%{transform:translateY(-4px);}
    100%{transform:translateY(0);}
  }
  .bounce{animation:bounceIn 1.6s ease-in-out infinite;}

  /* cursor trail */
  .cursor-heart{
    position:fixed;pointer-events:none;z-index:998;
    font-size:14px;color:var(--pink-1);
    animation:trailFade 1s ease forwards;
  }
  @keyframes trailFade{
    to{opacity:0;transform:translateY(-30px) scale(0.4);}
  }

  /* ---------- MAIN LAYOUT ---------- */
  main{
    position:relative;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:40px 18px;
  }

  .card{
    position:relative;
    width:100%;max-width:430px;
    padding:44px 30px 38px;
    border-radius:28px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 20px 60px rgba(0,0,0,0.6),
      0 0 80px rgba(255,30,120,0.15);
    text-align:center;
    opacity:0;
    transform:translateY(30px);
    animation: cardIn 1.1s cubic-bezier(.2,.8,.3,1) .3s forwards, cardFloat 6s ease-in-out 1.4s infinite;
    overflow:hidden;
  }
  @keyframes cardIn{to{opacity:1;transform:translateY(0);}}
  @keyframes cardFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
  }

  .card::before{
    content:"";
    position:absolute;inset:0;
    background:linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.06) 45%, transparent 60%);
    background-size:250% 250%;
    animation:reflectionMove 7s linear infinite;
    pointer-events:none;
  }
  @keyframes reflectionMove{
    0%{background-position:0% 0%;}
    100%{background-position:100% 100%;}
  }

  /* floating handled via combined animation on .card above */

  .profile-wrap{
    position:relative;
    width:110px;height:110px;
    margin:0 auto 18px;
    border-radius:50%;
    cursor:pointer;
  }
  .profile-pic{
    width:100%;height:100%;border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,0.15);
    box-shadow:0 0 0 4px rgba(255,30,130,0.25), 0 0 30px 6px rgba(255,20,120,0.55);
    animation:glowPulse 2.4s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%,100%{box-shadow:0 0 0 4px rgba(255,30,130,0.25), 0 0 25px 4px rgba(255,20,120,0.45);}
    50%{box-shadow:0 0 0 4px rgba(255,30,130,0.4), 0 0 40px 10px rgba(255,20,120,0.75);}
  }

  .name{
    font-family:'Dancing Script',cursive;
    font-size:2.1rem;
    color:#fff;
    text-shadow:0 0 18px rgba(255,60,150,0.7);
    margin-bottom:4px;
  }
  .subtitle{
    font-size:.92rem;
    color:var(--pink-3);
    opacity:.85;
    margin-bottom:22px;
    font-weight:300;
  }
  .title{
    font-family:'Dancing Script',cursive;
    font-weight:700;
    font-size:2.3rem;
    line-height:1.25;
    background:linear-gradient(90deg,#fff,var(--pink-2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    min-height:2.6em;
    margin-bottom:14px;
    text-shadow:0 0 30px rgba(255,50,140,0.25);
  }
  .cursor-blink{
    display:inline-block;width:2px;background:var(--pink-2);
    animation:blink .8s steps(1) infinite;
    margin-left:2px;
  }
  @keyframes blink{50%{opacity:0;}}

  .desc{
    font-size:.88rem;
    color:rgba(255,255,255,0.75);
    font-weight:300;
    margin-bottom:30px;
    line-height:1.6;
  }

  .btn-row{
    position:relative;
    display:flex;
    gap:16px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    min-height:70px;
  }

  .yes-btn{
    position:relative;
    border:none;outline:none;cursor:pointer;
    padding:16px 34px;
    border-radius:26px;
    font-family:'Poppins',sans-serif;
    font-weight:600;
    font-size:1rem;
    color:#fff;
    background:linear-gradient(135deg,#ff2e93,#ff6fb0,#ff2e93);
    background-size:200% 200%;
    box-shadow:0 8px 25px rgba(255,30,140,0.45), 0 0 25px rgba(255,60,150,0.3);
    transition:transform .25s ease, box-shadow .25s ease, padding .4s ease, font-size .4s ease;
    animation:heartbeat 2.4s ease-in-out infinite;
    z-index:5;
  }
  .yes-btn:hover{
    transform:scale(1.08);
    box-shadow:0 10px 34px rgba(255,30,140,0.65), 0 0 45px rgba(255,60,150,0.5);
  }
  @keyframes heartbeat{
    0%,100%{transform:scale(1);}
    10%{transform:scale(1.05);}
    20%{transform:scale(0.98);}
    30%{transform:scale(1.04);}
    40%{transform:scale(1);}
  }
  .yes-btn.grown{
    padding:22px 50px;
    font-size:1.25rem;
    animation:none;
  }

  .no-btn{
    padding:12px 22px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.05);
    color:rgba(255,255,255,0.65);
    font-family:'Poppins',sans-serif;
    font-size:.85rem;
    cursor:pointer;
    transition:transform .18s ease;
    position:relative;
    z-index:6;
  }
  .no-btn.escaping{
    position:fixed;
  }
  .no-btn.hidden-btn{
    opacity:0;
    pointer-events:none;
    transform:scale(0.3);
  }
  @keyframes shakeNo{
    0%,100%{transform:translateX(0) rotate(0deg);}
    25%{transform:translateX(-4px) rotate(-6deg);}
    75%{transform:translateX(4px) rotate(6deg);}
  }
  .no-btn.shaking{animation:shakeNo .25s ease;}

  /* result message */
  .result-box{
    margin-top:22px;
    opacity:0;
    max-height:0;
    overflow:hidden;
    transition:opacity .6s ease, max-height .6s ease, margin .6s ease;
  }
  .result-box.show{
    opacity:1;max-height:220px;margin-top:22px;
  }
  .result-title{
    font-family:'Dancing Script',cursive;
    font-size:1.8rem;
    color:#fff;
    text-shadow:0 0 20px rgba(255,60,150,0.8);
    margin-bottom:6px;
  }
  .result-sub{
    font-size:.85rem;
    color:var(--pink-3);
    margin-bottom:4px;
    font-weight:300;
  }

  .no-msg{
    margin-top:14px;
    font-size:.85rem;
    color:var(--pink-2);
    min-height:20px;
    font-weight:400;
  }

  /* sound toggle */
  .sound-toggle{
    position:fixed;top:16px;right:16px;z-index:50;
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    display:flex;align-items:center;justify-content:center;
    font-size:1.2rem;cursor:pointer;color:#fff;
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .sound-toggle:hover{transform:scale(1.08);box-shadow:0 0 20px rgba(255,60,150,0.4);}

  /* popup */
  .popup-overlay{
    position:fixed;inset:0;z-index:900;
    background:rgba(5,3,10,0.7);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .4s ease;
  }
  .popup-overlay.show{opacity:1;pointer-events:all;}
  .popup-box{
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(20px);
    padding:34px 30px;
    border-radius:24px;
    text-align:center;
    max-width:320px;
    transform:scale(.8);
    transition:transform .4s cubic-bezier(.2,.9,.3,1.2);
    box-shadow:0 0 50px rgba(255,30,140,0.35);
  }
  .popup-overlay.show .popup-box{transform:scale(1);}
  .popup-box p{
    font-family:'Dancing Script',cursive;
    font-size:1.6rem;color:#fff;
    text-shadow:0 0 16px rgba(255,60,150,0.7);
  }

  /* easter egg secret text */
  .secret-msg{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0.5);
    font-family:'Dancing Script',cursive;
    font-size:2.2rem;color:#fff;
    text-shadow:0 0 25px var(--pink-1);
    z-index:950;
    opacity:0;pointer-events:none;
    transition:opacity .5s ease, transform .5s ease;
  }
  .secret-msg.show{opacity:1;transform:translate(-50%,-50%) scale(1);}

  footer.credit{
    position:relative;
    text-align:center;
    color:rgba(255,255,255,0.25);
    font-size:.7rem;
    padding:14px 0 26px;
  }

  @media (max-width:480px){
    .card{padding:36px 20px 30px;border-radius:24px;}
    .title{font-size:1.9rem;}
    .name{font-size:1.8rem;}
    .btn-row{gap:12px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-heart">💗</div>
  <div class="loader-text">Loading Love... 💕</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div id="bg-gradient"></div>
<div id="glow-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>
<div id="particle-layer"></div>

<button class="sound-toggle" id="soundToggle" title="Toggle music">🔇</button>

<main>
  <div class="card card-floating" id="mainCard">
    <div class="profile-wrap" id="profilePic">
      <img class="profile-pic" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Tanya&backgroundColor=ffd1e8" alt="Profile picture">
    </div>
    <div class="name">Tanya ✨</div>
    <div class="subtitle">You seem really sweet... <span class="bounce" style="display:inline-block;">💖</span></div>

    <div class="title" id="typedTitle"></div>

    <div class="desc">I promise I'll make you smile every day. 🤍✨</div>

    <div class="btn-row" id="btnRow">
      <button class="yes-btn" id="yesBtn">💖 Yes, Of Course!</button>
      <button class="no-btn" id="noBtn">🙈 No</button>
    </div>
    <div class="no-msg" id="noMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-title">Yayyyyy!! 🥹💖</div>
      <div class="result-sub">You just made my entire day!! 🌸✨</div>
      <div class="result-sub">Welcome, Bestie! 🧸💕</div>
    </div>
  </div>
</main>

<footer class="credit">made with 💗 — click my picture 5 times for a surprise</footer>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box"><p>Hehe... I knew you'd stay. 💖🧸</p></div>
</div>

<div class="secret-msg" id="secretMsg">Secret unlocked! 🌸</div>

<canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:500;"></canvas>

<audio id="bgMusic" loop preload="none">
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
</audio>

<script>
/* ============ UTILITIES ============ */
const rand = (min,max) => Math.random()*(max-min)+min;

/* ============ LOADER ============ */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
  }, 2200);
});

/* ============ AMBIENT PARTICLES (hearts, sparkles, butterflies, stars, petals) ============ */
const particleLayer = document.getElementById('particle-layer');
const emojiSets = {
  heart: ['💗','💕','💖','❤️'],
  sparkle: ['✨','⭐','🌟'],
  butterfly: ['🦋'],
  petal: ['🌸','🌺'],
};

function spawnParticle(type){
  const el = document.createElement('div');
  el.className = 'particle';
  const set = emojiSets[type];
  el.textContent = set[Math.floor(Math.random()*set.length)];
  const size = rand(14,28);
  el.style.fontSize = size+'px';
  el.style.left = rand(0,100)+'vw';
  el.style.top = '105vh';
  el.style.opacity = rand(.4,.9);
  const duration = rand(9,18);
  const drift = rand(-80,80);
  const rotate = rand(-180,180);
  particleLayer.appendChild(el);

  el.animate([
    { transform:`translate(0,0) rotate(0deg)`, opacity:0 },
    { transform:`translate(${drift*0.3}px,-40vh) rotate(${rotate*0.5}deg)`, opacity:el.style.opacity, offset:.15},
    { transform:`translate(${drift}px,-115vh) rotate(${rotate}deg)`, opacity:0 }
  ], { duration: duration*1000, easing:'linear' }).onfinish = () => el.remove();
}

setInterval(()=>spawnParticle('heart'), 700);
setInterval(()=>spawnParticle('sparkle'), 900);
setInterval(()=>spawnParticle('petal'), 1400);
setInterval(()=>spawnParticle('butterfly'), 3500);

/* dedicated twinkling tiny stars — fixed in place, fading in/out, distinct from drifting sparkles */
function spawnStar(){
  const star = document.createElement('div');
  star.className = 'star-particle';
  star.textContent = '⭐';
  star.style.left = rand(0,100)+'vw';
  star.style.top = rand(0,90)+'vh';
  star.style.fontSize = rand(8,15)+'px';
  star.style.animationDuration = rand(1.6,3.2)+'s';
  particleLayer.appendChild(star);
  setTimeout(()=>star.remove(), 5000);
}
setInterval(spawnStar, 350);
for(let i=0;i<15;i++) setTimeout(spawnStar, i*100);

/* ============ MOUSE PARALLAX ============ */
document.addEventListener('mousemove', (e)=>{
  const x = (e.clientX / window.innerWidth - 0.5);
  const y = (e.clientY / window.innerHeight - 0.5);
  document.getElementById('glow-blobs').style.transform = `translate(${x*20}px, ${y*20}px)`;
  document.getElementById('mainCard').style.transform = `translate(${x*8}px, ${y*8}px)`;
});

/* ============ CURSOR HEART TRAIL ============ */
let lastTrail = 0;
document.addEventListener('mousemove', (e)=>{
  const now = Date.now();
  if(now - lastTrail < 60) return;
  lastTrail = now;
  const heart = document.createElement('div');
  heart.className = 'cursor-heart';
  heart.textContent = ['💗','✨','💕'][Math.floor(Math.random()*3)];
  heart.style.left = e.clientX + 'px';
  heart.style.top = e.clientY + 'px';
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(), 1000);
});

/* ============ TYPING TITLE ANIMATION ============ */
const titleText = "Will You Be My Friend? 🥺🎀";
const typedEl = document.getElementById('typedTitle');
let ti = 0;
function typeTitle(){
  if(ti <= titleText.length){
    typedEl.innerHTML = titleText.slice(0,ti) + '<span class="cursor-blink">&nbsp;</span>';
    ti++;
    setTimeout(typeTitle, 55);
  } else {
    typedEl.innerHTML = titleText;
  }
}
setTimeout(typeTitle, 1200);

/* ============ NO BUTTON EVASION ============ */
const noBtn = document.getElementById('noBtn');
const btnRow = document.getElementById('btnRow');
const noMsg = document.getElementById('noMsg');
const yesBtn = document.getElementById('yesBtn');
const popupOverlay = document.getElementById('popupOverlay');
let noAttempts = 0;
let noEscaped = false;

const attemptMessages = [
  "Nha cutie 😭💕",
  "Are you sure? 🥺",
  "Think again! 🎀",
  "I'm too cute to reject 🤍"
];

function moveNoButton(){
  if(noEscaped) return;
  noEscaped = true;
  noBtn.classList.add('escaping');
  const rect = noBtn.getBoundingClientRect();
  const maxX = window.innerWidth - rect.width - 20;
  const maxY = window.innerHeight - rect.height - 20;
  const newX = rand(20, Math.max(20,maxX));
  const newY = rand(80, Math.max(80,maxY));
  noBtn.style.left = newX + 'px';
  noBtn.style.top = newY + 'px';
  noBtn.style.transform = `rotate(${rand(-20,20)}deg)`;
  noBtn.classList.add('shaking');
  setTimeout(()=>noBtn.classList.remove('shaking'), 250);
}

function isNear(mx,my){
  const rect = noBtn.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dist = Math.hypot(mx-cx, my-cy);
  return dist < 120;
}

document.addEventListener('mousemove', (e)=>{
  if(noAttempts >= 5) return;
  if(isNear(e.clientX, e.clientY)){
    moveNoButton();
  }
});
document.addEventListener('touchstart', (e)=>{
  if(noAttempts >= 5) return;
  const t = e.touches[0];
  if(isNear(t.clientX, t.clientY)){
    moveNoButton();
  }
}, {passive:true});

noBtn.addEventListener('click', ()=>{
  if(noAttempts < 4){
    noMsg.textContent = attemptMessages[noAttempts];
    noAttempts++;
    moveNoButton();
  } else {
    noAttempts = 5;
    noBtn.classList.add('hidden-btn');
    noMsg.textContent = '';
    popupOverlay.classList.add('show');
    setTimeout(()=>{
      popupOverlay.classList.remove('show');
      yesBtn.classList.add('grown');
    }, 1800);
  }
});

/* ============ YES BUTTON ============ */
const resultBox = document.getElementById('resultBox');
let yesClicked = false;

yesBtn.addEventListener('click', ()=>{
  if(yesClicked) return;
  yesClicked = true;
  resultBox.classList.add('show');
  document.body.style.transition = 'transform .6s ease';
  document.body.style.transform = 'scale(1.03)';
  setTimeout(()=>{ document.body.style.transform = 'scale(1)'; }, 700);

  // brighten background
  document.getElementById('bg-gradient').style.filter = 'brightness(1.4) saturate(1.3)';

  launchConfetti();
  burstHearts();
  burstSparkles();

  yesBtn.textContent = '🧸 Yay! Bestie!';
  yesBtn.style.pointerEvents = 'none';
});

/* ============ CONFETTI CANVAS ============ */
const canvas = document.getElementById('confettiCanvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){canvas.width = window.innerWidth; canvas.height = window.innerHeight;}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function launchConfetti(){
  const colors = ['#ff2e93','#ff7ac6','#ffd1e8','#ffffff','#ff5fa2'];
  let pieces = [];
  for(let i=0;i<160;i++){
    pieces.push({
      x: canvas.width/2 + rand(-40,40),
      y: canvas.height/2 + rand(-40,40),
      vx: rand(-9,9),
      vy: rand(-14,-4),
      size: rand(6,11),
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: rand(0,360),
      vr: rand(-8,8),
      shape: Math.random()>0.5?'rect':'circle'
    });
  }
  let frame = 0;
  const maxFrames = 130;
  function animateConfetti(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.vy += 0.28;
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame/maxFrames);
      if(p.shape==='rect'){
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      } else {
        ctx.beginPath();
        ctx.arc(0,0,p.size/2,0,Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    });
    if(frame < maxFrames){
      requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }
  animateConfetti();

  // fireworks bursts
  for(let b=0;b<3;b++){
    setTimeout(()=>fireworkBurst(rand(0.2,0.8)*canvas.width, rand(0.2,0.6)*canvas.height), b*400);
  }
}

function fireworkBurst(cx,cy){
  const colors = ['#ff2e93','#ff7ac6','#ffd1e8','#ffffff'];
  let particles = [];
  const count = 40;
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2/count)*i;
    const speed = rand(2,6);
    particles.push({
      x:cx, y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:rand(2,4)
    });
  }
  let frame=0;
  const maxFrames=60;
  function step(){
    frame++;
    ctx.save();
    particles.forEach(p=>{
      p.vy += 0.09;
      p.x += p.vx;
      p.y += p.vy;
      ctx.globalAlpha = Math.max(0,1-frame/maxFrames);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
    if(frame<maxFrames){
      requestAnimationFrame(step);
    }
  }
  step();
}

/* ============ EASTER EGG: profile picture x5 ============ */
const profilePic = document.getElementById('profilePic');
const secretMsg = document.getElementById('secretMsg');
let picClicks = 0;

profilePic.addEventListener('click', ()=>{
  picClicks++;
  profilePic.animate([
    {transform:'scale(1)'},
    {transform:'scale(1.15)'},
    {transform:'scale(1)'}
  ], {duration:300});

  if(picClicks === 5){
    secretMsg.classList.add('show');
    rainHearts(5000);
    setTimeout(()=>secretMsg.classList.remove('show'), 2200);
    picClicks = 0;
  }
});

function rainHearts(duration){
  const end = Date.now() + duration;
  function drop(){
    if(Date.now() > end) return;
    for(let i=0;i<4;i++){
      const h = document.createElement('div');
      h.className='particle';
      h.textContent = ['💗','💕','💖','✨'][Math.floor(Math.random()*4)];
      h.style.fontSize = rand(10,20)+'px';
      h.style.left = rand(0,100)+'vw';
      h.style.top = '-5vh';
      h.style.zIndex = 700;
      document.body.appendChild(h);
      h.animate([
        {transform:'translateY(0)', opacity:1},
        {transform:`translateY(110vh)`, opacity:0.9}
      ],{duration:rand(2000,3500), easing:'linear'}).onfinish=()=>h.remove();
    }
    requestAnimationFrame(drop);
  }
  drop();
}

/* ============ SOUND TOGGLE ============ */
const soundToggle = document.getElementById('soundToggle');
const bgMusic = document.getElementById('bgMusic');
let musicOn = false;
soundToggle.addEventListener('click', ()=>{
  musicOn = !musicOn;
  if(musicOn){
    bgMusic.volume = 0.3;
    const playPromise = bgMusic.play();
    if(playPromise){
      playPromise.then(()=>{
        soundToggle.textContent = '🔊';
      }).catch(()=>{
        musicOn = false;
        soundToggle.textContent = '🔇';
        soundToggle.title = 'Music unavailable — add your own track in the audio tag';
      });
    }
  } else {
    bgMusic.pause();
    soundToggle.textContent = '🔇';
  }
});
